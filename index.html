<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TrackIt</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#F7F6F3;--surface:#fff;--surface2:#F0EEE9;--border:#E2DDD6;--text:#1A1916;--text-muted:#7A7670;--accent:#2563EB;--accent-light:#EFF6FF;--elec:#F59E0B;--elec-light:#FFFBEB;--gas:#10B981;--gas-light:#ECFDF5;--exp:#8B5CF6;--exp-light:#F5F3FF;--danger:#DC2626;--warn:#D97706;--warn-light:#FFFBEB;--success:#16A34A;--success-light:#F0FDF4;--shadow:rgba(0,0,0,0.06);--radius:12px;--radius-sm:8px;}
[data-theme="dark"]{--bg:#0F1117;--surface:#1A1D27;--surface2:#23263A;--border:#2E3348;--text:#F0EEF8;--text-muted:#7B80A0;--accent:#4F8EF7;--accent-light:#1A2644;--elec:#FBBF24;--elec-light:#1F1A00;--gas:#34D399;--gas-light:#052E20;--exp:#A78BFA;--exp-light:#1E1244;--danger:#F87171;--warn:#FCD34D;--warn-light:#1F1500;--success:#4ADE80;--success-light:#052E20;--shadow:rgba(0,0,0,0.3);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background 0.2s,color 0.2s;}

/* NAV */
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:100;}
.nav-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;}
.nav-logo{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;}
.nav-logo span{color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:6px;}
.tabs{display:flex;gap:4px;}
.tab{padding:6px 10px;border-radius:20px;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.15s;}
.tab.active{background:var(--accent);color:#fff;}
.icon-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:6px 10px;font-size:16px;cursor:pointer;color:var(--text-muted);transition:all 0.15s;line-height:1;}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}

/* SEARCH OVERLAY */
.search-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;}
.search-overlay-header{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--surface);}
.search-overlay-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:16px;background:var(--surface);color:var(--text);outline:none;}
.search-overlay-input:focus{border-color:var(--accent);}
.search-overlay-body{flex:1;overflow-y:auto;padding:12px 16px;}
.search-result-item{padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);background:var(--surface);}
.search-result-item:first-child{border-radius:var(--radius) var(--radius) 0 0;}
.search-result-item:last-child{border-bottom:none;border-radius:0 0 var(--radius) var(--radius);}
.search-result-item:hover{background:var(--bg);}
.sri-name{font-weight:600;font-size:15px;}
.sri-meta{font-size:12px;color:var(--text-muted);margin-top:3px;}
.search-results-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 16px var(--shadow);}

main{max-width:600px;margin:0 auto;padding:16px 16px 90px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.card-title{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;margin-bottom:12px;}

/* QUICK PINS */
.pins-wrap{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;}
.pins-wrap::-webkit-scrollbar{display:none;}
.pin-btn{padding:8px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--exp);background:var(--exp-light);color:var(--exp);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.15s;}
.pin-btn:hover{background:var(--exp);color:#fff;}
.add-pin-btn{padding:8px 12px;border-radius:var(--radius-sm);border:1.5px dashed var(--border);background:transparent;color:var(--text-muted);font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;}

/* SUMMARY / STATS */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.stat-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;}
.stat-value{font-family:'Sora',sans-serif;font-size:22px;font-weight:700;margin-top:4px;}
.stat-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-label{font-size:13px;font-weight:500;width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-outer{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.bar-inner{height:100%;border-radius:4px;}
.bar-amt{font-size:12px;font-weight:600;color:var(--text-muted);width:70px;text-align:right;flex-shrink:0;}

/* ALERTS */
.alert{border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;}
.alert.warn{background:var(--warn-light);border:1px solid #FDE68A;}
.alert.danger{background:#FEF2F2;border:1px solid #FECACA;}
[data-theme="dark"] .alert.danger{background:#2D1515;border-color:#7F2020;}
.alert.info{background:var(--accent-light);border:1px solid #BFDBFE;}
.alert.success{background:var(--success-light);border:1px solid #86EFAC;}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.alert-text{font-size:13px;line-height:1.5;}
.alert-text strong{font-weight:600;}

/* ITEM DETAIL */
.item-detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.item-detail-header{padding:16px;border-bottom:1px solid var(--border);}
.item-name-big{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;}
.item-price-row{display:flex;align-items:flex-end;justify-content:space-between;margin-top:10px;}
.latest-price{font-family:'Sora',sans-serif;font-size:26px;font-weight:700;color:var(--exp);}
.unit-price-pill{background:var(--exp-light);color:var(--exp);font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;}
.price-label{font-size:11px;color:var(--text-muted);}
.history-row{padding:12px 16px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:72px 1fr auto;gap:8px;align-items:start;}
.history-row:last-child{border-bottom:none;}
.h-date{font-size:12px;color:var(--text-muted);}
.h-price{font-weight:700;font-size:15px;}
.h-unit-price{font-size:11px;color:var(--exp);font-weight:600;margin-top:1px;}
.h-meta{font-size:12px;color:var(--text-muted);margin-top:2px;}
.h-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;align-self:start;}
.h-badge.up{background:#FEE2E2;color:var(--danger);}
.h-badge.down{background:#D1FAE5;color:#065F46;}
[data-theme="dark"] .h-badge.down{background:#052E20;color:#34D399;}
.h-badge.same{background:var(--surface2);color:var(--text-muted);}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:13px;color:var(--accent);font-weight:500;cursor:pointer;margin-bottom:12px;padding:0;}

/* FORM */
.form-sheet{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;}
.form-header{padding:16px;border-bottom:1px solid var(--border);}
.form-body{padding:16px;display:flex;flex-direction:column;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px;}
input,select{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:'Inter',sans-serif;background:var(--surface);color:var(--text);outline:none;transition:border 0.15s;-webkit-appearance:none;}
input:focus,select:focus{border-color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-footer{padding:16px;border-top:1px solid var(--border);display:flex;gap:8px;}
.btn{width:100%;padding:13px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-exp{background:var(--exp);color:#fff;}
.btn-primary:hover,.btn-exp:hover{opacity:0.88;}
.btn-sm{width:auto;padding:9px 14px;font-size:13px;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn-danger-outline{background:transparent;border:1.5px solid var(--danger);color:var(--danger);}
.new-inline{display:flex;gap:8px;margin-top:8px;align-items:center;}
.new-inline input{flex:1;padding:9px 12px;font-size:14px;}
.edit-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 8px;font-size:12px;cursor:pointer;color:var(--text-muted);}
.delete-btn{background:none;border:1px solid #FECACA;border-radius:var(--radius-sm);padding:5px 8px;font-size:12px;cursor:pointer;color:var(--danger);}

/* AUTOCOMPLETE */
.autocomplete-wrap{position:relative;}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1.5px solid var(--accent);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);z-index:50;max-height:200px;overflow-y:auto;box-shadow:0 4px 12px var(--shadow);}
.autocomplete-item{padding:10px 12px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border);}
.autocomplete-item:last-child{border-bottom:none;}
.autocomplete-item:hover{background:var(--bg);}
.autocomplete-item .ac-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}
.modal-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);padding:4px;}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:14px;}
.modal-footer{padding:16px;border-top:1px solid var(--border);display:flex;gap:8px;}

/* BUDGET */
.budget-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.budget-info{flex:1;}
.budget-name{font-size:13px;font-weight:600;}
.budget-bar-wrap{flex:1;height:10px;background:var(--surface2);border-radius:5px;overflow:hidden;margin-top:4px;}
.budget-bar{height:100%;border-radius:5px;transition:width 0.3s;}
.budget-amounts{font-size:11px;color:var(--text-muted);margin-top:3px;}
.budget-pct{font-size:12px;font-weight:700;width:36px;text-align:right;flex-shrink:0;}

/* EXPENSE TAB */
.exp-hero{background:var(--exp-light);border:1px solid var(--exp);border-radius:var(--radius);padding:20px;margin-bottom:12px;text-align:center;}
.exp-hero-label{font-size:11px;font-weight:600;color:var(--exp);text-transform:uppercase;letter-spacing:0.5px;}
.exp-hero-value{font-family:'Sora',sans-serif;font-size:36px;font-weight:700;color:var(--exp);margin:6px 0;}
.exp-hero-sub{font-size:12px;color:var(--text-muted);}
.medium-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border 0.15s;}
.medium-card.selected{border-color:var(--exp);background:var(--exp-light);}
.medium-name{font-weight:600;font-size:14px;}
.medium-meta{font-size:12px;color:var(--text-muted);margin-top:2px;}
.medium-amount{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;color:var(--exp);text-align:right;}
.medium-count{font-size:11px;color:var(--text-muted);text-align:right;margin-top:2px;}
.adjust-btn{width:100%;padding:15px;border:2px dashed var(--exp);border-radius:var(--radius);background:transparent;color:var(--exp);font-size:15px;font-weight:700;cursor:pointer;text-align:center;margin-bottom:12px;}
.adj-badge{display:flex;align-items:center;gap:8px;background:var(--success-light);border:1px solid var(--success);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:10px;}
.filter-row{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.filter-chip.active{background:var(--exp);border-color:var(--exp);color:#fff;}
.exp-entry-row{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.exp-entry-row:last-child{border-bottom:none;}
.exp-entry-info{flex:1;}
.exp-entry-name{font-weight:600;font-size:14px;}
.exp-entry-meta{font-size:12px;color:var(--text-muted);margin-top:2px;}
.exp-entry-amount{font-weight:700;font-size:15px;color:var(--exp);}
.exp-entry-medium{font-size:11px;color:var(--text-muted);margin-top:2px;}

/* UTILITY */
.util-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.util-btn{padding:12px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--surface);font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s;color:var(--text-muted);}
.util-btn.elec.active{border-color:var(--elec);background:var(--elec-light);color:var(--elec);}
.util-btn.gas.active{border-color:var(--gas);background:var(--gas-light);color:var(--gas);}
.util-hero{border-radius:var(--radius);padding:20px;margin-bottom:12px;}
.util-hero.elec{background:var(--elec-light);border:1px solid #FDE68A;}
.util-hero.gas{background:var(--gas-light);border:1px solid #6EE7B7;}
.util-hero-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);}
.util-hero-value{font-family:'Sora',sans-serif;font-size:32px;font-weight:700;margin:4px 0;}
.util-hero-value.elec{color:var(--elec);}
.util-hero-value.gas{color:var(--gas);}
.util-hero-sub{font-size:12px;color:var(--text-muted);}
.util-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.util-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;}
.util-stat-label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;}
.util-stat-value{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;margin-top:4px;}
.util-stat-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.reading-row{padding:10px 16px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:80px 1fr 1fr;gap:8px;align-items:center;}
.reading-row:last-child{border-bottom:none;}
.rr-date{font-size:12px;color:var(--text-muted);}
.rr-balance{font-weight:700;font-size:14px;}
.rr-consumed{font-size:12px;color:var(--text-muted);text-align:right;}
.rr-consumed.high{color:var(--danger);font-weight:600;}
.rr-interp{font-size:10px;color:var(--text-muted);font-style:italic;}

/* MONTH FILTER */
.month-filter{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;}
.month-filter::-webkit-scrollbar{display:none;}
.month-chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.month-chip.active{background:var(--exp);border-color:var(--exp);color:#fff;}

/* ITEMS TAB */
.cat-filter{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;}
.cat-filter::-webkit-scrollbar{display:none;}
.cat-chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.cat-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.item-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.item-stat{text-align:center;}
.item-stat-val{font-size:13px;font-weight:700;color:var(--exp);}
.item-stat-label{font-size:10px;color:var(--text-muted);margin-top:1px;}

/* RECURRING BADGE */
.recur-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--accent-light);color:var(--accent);margin-left:6px;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 10px;font-size:9px;font-weight:600;color:var(--text-muted);cursor:pointer;gap:3px;transition:color 0.15s;border:none;background:none;}
.bnav-item.active{color:var(--accent);}
.bnav-item.exp-nav.active{color:var(--exp);}
.bnav-icon{font-size:18px;}

/* MISC */
.empty{text-align:center;padding:40px 20px;color:var(--text-muted);}
.empty-icon{font-size:36px;margin-bottom:8px;}
.empty p{font-size:14px;}
.loading{text-align:center;padding:30px;color:var(--text-muted);font-size:14px;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1916;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
[data-theme="dark"] .toast{background:#F0EEF8;color:#0F1117;}
.toast.show{opacity:1;}
body.keyboard-open .bottom-nav{display:none;}
body.keyboard-open main{padding-bottom:16px;}
.section-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="nav-logo">track<span>it</span></div>
    <div class="nav-right">
      <div class="tabs">
        <button class="tab active" onclick="switchContext('Home')">🏠</button>
        <button class="tab" onclick="switchContext('Office')">🏢</button>
      </div>
      <button class="icon-btn" onclick="openSearch()" title="Search">🔍</button>
      <button class="icon-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>
  </div>
</nav>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="search-overlay" style="display:none;">
  <div class="search-overlay-header">
    <input class="search-overlay-input" id="search-overlay-input" placeholder="Search items…" oninput="handleGlobalSearch(this.value)" autocomplete="off"/>
    <button class="btn-outline btn-sm" onclick="closeSearch()" style="flex-shrink:0;">✕ Close</button>
  </div>
  <div class="search-overlay-body" id="search-overlay-body">
    <div style="color:var(--text-muted);font-size:14px;text-align:center;padding:30px 0;">Start typing to search items…</div>
  </div>
</div>

<main id="main"></main>
<div class="bottom-nav">
  <button class="bnav-item" id="bnav-add" onclick="setPage('add')"><span class="bnav-icon">➕</span>Add</button>
  <button class="bnav-item active" id="bnav-items" onclick="setPage('items')"><span class="bnav-icon">📦</span>Items</button>
  <button class="bnav-item exp-nav" id="bnav-expenses" onclick="setPage('expenses')"><span class="bnav-icon">💸</span>Expenses</button>
  <button class="bnav-item" id="bnav-utility" onclick="setPage('utility')"><span class="bnav-icon">⚡</span>Utils</button>
  <button class="bnav-item" id="bnav-manage" onclick="setPage('manage')"><span class="bnav-icon">⚙️</span>Manage</button>
</div>
<div id="modal-container"></div>
<div class="toast" id="toast"></div>

// UTILS
function fmt(n){return '৳'+Number(n).toLocaleString('en-BD');}
function fmtDate(d){if(!d)return '—';return new Date(d).toLocaleDateString('en-BD',{day:'numeric',month:'short',year:'numeric'});}
function fmtShort(d){if(!d)return '—';return new Date(d).toLocaleDateString('en-BD',{day:'numeric',month:'short'});}
function today(){return new Date().toISOString().split('T')[0];}
function daysInMonth(ym){const[y,m]=ym.split('-').map(Number);return new Date(y,m,0).getDate();}
function getMonths(){const m=[],now=new Date();for(let i=0;i<6;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);m.push({label:d.toLocaleDateString('en-BD',{month:'short',year:'numeric'}),value:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`});}return m;}
function esc(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function calcUnit(price,qty,unit){
  if(!qty||qty<=0||!unit)return null;
  const p=price/qty;
  const r={per:fmt(Math.round(p*100)/100)+'/'+unit,stdRate:null,stdUnit:null};
  if(unit==='g'){r.stdRate=fmt(Math.round(p*1000));r.stdUnit='kg';}
  else if(unit==='ml'){r.stdRate=fmt(Math.round(p*1000));r.stdUnit='L';}
  else{r.stdRate=fmt(Math.round(p*100)/100);r.stdUnit=unit==='pcs'?'pc':unit;}
  return r;
}

function openSearch(){

function closeSearch(){document.getElementById('search-overlay').style.display='none';document.getElementById('search-overlay-input').value='';document.getElementById('search-overlay-body').innerHTML='<div style="color:var(--text-muted);font-size:14px;text-align:center;padding:30px 0;">Start typing to search items…</div>';}

async function handleGlobalSearch(q){
  clearTimeout(searchTimeout);
  const body=document.getElementById('search-overlay-body');
  if(!q.trim()){body.innerHTML='<div style="color:var(--text-muted);font-size:14px;text-align:center;padding:30px 0;">Start typing to search items…</div>';return;}
  searchTimeout=setTimeout(async()=>{
    const{data:entries}=await sb.from('expense_entries').select('item_name,amount,quantity,unit,purchased_at,category_id').ilike('item_name',`%${q}%`).order('purchased_at',{ascending:false});
    const catMap=Object.fromEntries(categories.map(c=>[c.id,c.name]));
    const itemMap={};
    (entries||[]).forEach(e=>{if(!itemMap[e.item_name]){itemMap[e.item_name]={latest:e,count:1,total:e.amount,cat:catMap[e.category_id]||''};}else{itemMap[e.item_name].count++;itemMap[e.item_name].total+=e.amount;}});
    if(!Object.keys(itemMap).length){body.innerHTML=`<div class="empty"><div class="empty-icon">🔎</div><p>No items found for "${q}"</p></div>`;return;}
    let html=`<div class="search-results-wrap">`;
    Object.entries(itemMap).forEach(([name,data])=>{
      const lp=data.latest;const uObj=calcUnit(lp.amount,lp.quantity,lp.unit);
      const stdRate=uObj&&uObj.stdRate?`${uObj.stdRate}/${uObj.stdUnit}`:'';
      html+=`<div class="search-result-item" onclick="openItemFromSearch('${esc(name)}')">
        <div class="sri-name">${name}</div>
        <div class="sri-meta">${data.cat} · Last: ${fmt(lp.amount)}${lp.quantity&&lp.unit?' for '+lp.quantity+' '+lp.unit:''}${stdRate?' · '+stdRate:''} · ${fmtShort(lp.purchased_at)} · ${data.count} purchase${data.count>1?'s':''}</div>
      </div>`;
    });
    html+=`</div>`;
    body.innerHTML=html;
  },300);
}

}

// AUTOCOMPLETE
async function itemAC(q){
  const list=document.getElementById('ac-list');
  if(!q||q.length<2){list.style.display='none';return;}
  const{data}=await sb.from('expense_entries').select('item_name,category_id,amount,quantity,unit').ilike('item_name',`%${q}%`).order('purchased_at',{ascending:false}).limit(20);
  const seen=new Set();const items=[];
  (data||[]).forEach(e=>{if(!seen.has(e.item_name)){seen.add(e.item_name);items.push(e);}});
  if(!items.length){list.style.display='none';return;}
  const catMap=Object.fromEntries(categories.map(c=>[c.id,c.name]));
  list.innerHTML=items.map(e=>`<div class="autocomplete-item" onmousedown="selectAC('${esc(e.item_name)}','${e.category_id||''}')">
    ${e.item_name}<div class="ac-sub">${catMap[e.category_id]||''}${e.amount?' · Last: '+fmt(e.amount)+(e.quantity&&e.unit?' for '+e.quantity+' '+e.unit:''):''}</div>
  </div>`).join('');
  list.style.display='block';
}
function hideAC(){const l=document.getElementById('ac-list');if(l)l.style.display='none';}
function selectAC(name,catId){
  document.getElementById('f-item').value=name;
  if(catId){const sel=document.getElementById('f-cat');if([...sel.options].find(o=>o.value===catId))sel.value=catId;}
  hideAC();
}

  el.textContent=u.stdRate&&u.stdUnit!==unit?`${u.per} · ${u.stdRate}/${u.stdUnit}`:u.per;

async function renderItems(){

  allEntries=entries||[];
  const catMap=Object.fromEntries(categories.map(c=>[c.id,c.name]));
  const medMap=Object.fromEntries(mediums.map(m=>[m.id,m.name]));
  // Group by item_name
  const itemMap={};
  allEntries.forEach(e=>{
    if(!itemMap[e.item_name]){itemMap[e.item_name]={entries:[],cat:e.category_id};}
    itemMap[e.item_name].entries.push(e);
  });
  const catChips=`<div class="cat-chip ${itemsCatFilter==='all'?'active':''}" onclick="setItemsCat('all')">All</div>`
    +categories.map(c=>`<div class="cat-chip ${itemsCatFilter===c.id?'active':''}" onclick="setItemsCat('${c.id}')">${c.name}</div>`).join('');
  let listHtml='';
  let filtered=Object.entries(itemMap);
  if(itemsCatFilter!=='all')filtered=filtered.filter(([,d])=>d.cat===itemsCatFilter);
  filtered.forEach(([name,data])=>{
    const entries=data.entries;
    const latest=entries[0];
    const total=entries.reduce((s,e)=>s+e.amount,0);
    const uObj=calcUnit(latest.amount,latest.quantity,latest.unit);
    const stdRate=uObj&&uObj.stdRate?`${uObj.stdRate}/${uObj.stdUnit}`:'';
    const qtyLabel=latest.quantity&&latest.unit?`${latest.quantity} ${latest.unit}`:'';
    const recurBadge=latest.is_recurring?`<span class="recur-badge">🔁 ${latest.recur_interval||'recurring'}</span>`:'';
    listHtml+=`<div class="card" style="padding:12px 16px;cursor:pointer;margin-bottom:8px;" onclick="showItemDetail('${esc(name)}')">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:14px;">${name}${recurBadge}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${catMap[data.cat]||''}${qtyLabel?' · Bought: '+qtyLabel:''}</div>
          <div class="item-summary">
            <div class="item-stat"><div class="item-stat-val">${fmt(latest.amount)}</div><div class="item-stat-label">Last price</div></div>
            <div class="item-stat"><div class="item-stat-val">${fmt(total)}</div><div class="item-stat-label">Total spent</div></div>
            <div class="item-stat"><div class="item-stat-val">${entries.length}×</div><div class="item-stat-label">Purchases</div></div>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          ${stdRate?`<div style="font-size:11px;color:var(--exp);font-weight:600;">${stdRate}</div>`:''}
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${fmtShort(latest.purchased_at)}</div>
        </div>

  const tc=isGas?'gas':'elec';
  el.innerHTML=`<div class="util-toggle"><button class="util-btn elec ${!isGas?'active':''}" onclick="setUtil('electricity')">⚡ Electricity</button><button class="util-btn gas ${isGas?'active':''}" onclick="setUtil('gas')">🔥 Gas</button></div>
    ${curBal!==null?`<div class="util-hero ${tc}"><div class="util-hero-label">Current Balance</div><div class="util-hero-value ${tc}">${curBal.toFixed(isGas?2:0)} ${unit}</div><div class="util-hero-sub">as of ${latestR?fmtDate(latestR.reading_date):'—'}</div></div>`:`<div class="alert info"><div class="alert-icon">💡</div><div class="alert-text">No readings yet. Log below.</div></div>`}
    ${alertHtml}${costInfo}
    <div class="form-sheet">
      <div class="form-header"><div class="card-title" style="margin-bottom:0;">${isGas?'🔥':'⚡'} Log Reading</div><div style="font-size:12px;color:var(--text-muted);margin-top:3px;">Today: ${fmtDate(today())}</div></div>
      <div class="form-body">
        <div class="form-group"><label>Balance (${unit})</label><input type="number" id="u-balance" placeholder="0" min="0" step="${isGas?'0.01':'1'}" inputmode="decimal"/></div>
        <div class="form-group"><label>Recharge Day?</label>
          <div onclick="toggleRechToggle()" id="rech-wrap" style="display:flex;align-items:center;gap:10px;padding:11px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;background:var(--surface);">
            <div id="rech-box" style="width:20px;height:20px;border-radius:6px;border:2px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;"></div>
            <span id="rech-label" style="font-size:14px;font-weight:500;color:var(--text-muted);">Not a recharge day</span>
            <input type="checkbox" id="u-is-rech" style="display:none;"/>
          </div>
        </div>
        <div class="form-group" id="rech-field" style="display:none;"><label>Recharge Amount (${unit})</label><input type="number" id="u-rech-amt" placeholder="0" min="0" step="${isGas?'0.01':'1'}" inputmode="decimal"/></div>
        <div class="form-group"><label>Notes</label><input type="text" id="u-notes" placeholder="Optional…"/></div>
      </div>
      <div class="form-footer"><button class="btn btn-primary" onclick="saveReading()">Save Reading</button></div>
    </div>
    ${rf.length?`<div class="card"><div class="card-title">Recent Readings</div><div style="margin:-4px;"><div class="reading-row" style="padding:8px 16px;"><div class="rr-date" style="font-weight:600;font-size:11px;text-transform:uppercase;">Date</div><div class="rr-balance" style="font-weight:600;font-size:11px;text-transform:uppercase;">Balance</div><div class="rr-consumed" style="font-weight:600;font-size:11px;text-transform:uppercase;">Used</div></div>${rHtml}</div></div>`:''}`;
}
function fillGaps(readings){
  if(!readings.length)return[];const result=[];
  for(let i=0;i<readings.length;i++){result.push({...readings[i],interpolated:false});if(i<readings.length-1){const curr=new Date(readings[i].reading_date),next=new Date(readings[i+1].reading_date);const days=Math.round((next-curr)/86400000);if(days>1){const nR=readings[i+1].is_recharge?(readings[i+1].recharge_amount||0):0;const drop=(readings[i].balance-(readings[i+1].balance-nR))/days;for(let d=1;d<days;d++){const dt=new Date(curr.getTime()+d*86400000);result.push({id:'interp-'+dt.toISOString().split('T')[0],type:readings[i].type,reading_date:dt.toISOString().split('T')[0],balance:parseFloat(Math.max(0,readings[i].balance-drop*d).toFixed(2)),interpolated:true,is_recharge:false,recharge_amount:0});}}}}
  return result.sort((a,b)=>a.reading_date.localeCompare(b.reading_date));
}
function setUtil(t){utilType=t;renderUtility();}

async function editReading(id,type,date){
  const{data:r}=await sb.from('utility_readings').select('*').eq('id',id).single();if(!r)return;
  const isGas=type==='gas';const unit=isGas?'m³':'৳';
  showModal(`<div class="modal"><div class="modal-header"><div class="modal-title">${isGas?'🔥':'⚡'} Edit Reading — ${fmtDate(date)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Balance (${unit})</label><input type="number" id="er-balance" value="${r.balance}" step="${isGas?'0.01':'1'}" inputmode="decimal"/></div>
      <div class="form-group" style="flex-direction:row;align-items:center;gap:10px;">
        <input type="checkbox" id="er-is-rech" ${r.is_recharge?'checked':''} style="width:auto;accent-color:var(--accent);" onchange="document.getElementById('er-rech-field').style.display=this.checked?'flex':'none';"/>
        <label for="er-is-rech" style="text-transform:none;font-size:14px;font-weight:500;color:var(--text);letter-spacing:0;">This was a recharge day</label>
      </div>
      <div class="form-group" id="er-rech-field" style="display:${r.is_recharge?'flex':'none'};">
        <label>Recharge Amount (${unit})</label>
        <input type="number" id="er-rech-amt" value="${r.recharge_amount||''}" step="${isGas?'0.01':'1'}" inputmode="decimal"/>
      </div>
      <div class="form-group"><label>Notes</label><input type="text" id="er-notes" value="${r.notes||''}"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger-outline btn-sm" onclick="deleteReading('${id}')">Delete</button>
      <button class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" style="flex:1;" onclick="saveEditReading('${id}')">Save</button>
    </div></div>`);
}

async function saveEditReading(id){
  const balance=parseFloat(document.getElementById('er-balance').value);
  const isRech=document.getElementById('er-is-rech').checked;
  const rechAmt=isRech?parseFloat(document.getElementById('er-rech-amt').value||0):0;
  const notes=document.getElementById('er-notes').value.trim()||null;
  if(isNaN(balance)||balance<0){showToast('Enter a valid balance');return;}
  if(isRech&&(!rechAmt||rechAmt<=0)){showToast('Enter recharge amount');return;}
  const{error}=await sb.from('utility_readings').update({balance,is_recharge:isRech,recharge_amount:isRech?rechAmt:0,notes}).eq('id',id);
  if(error){showToast('Error: '+error.message);return;}
  showToast('✓ Reading updated!');closeModal();renderUtility();
}

async function deleteReading(id){
  if(!confirm('Delete this reading?'))return;
  await sb.from('utility_readings').delete().eq('id',id);
  showToast('Deleted');closeModal();renderUtility();
}
function toggleRechToggle(){
  const cb=document.getElementById('u-is-rech');cb.checked=!cb.checked;const c=cb.checked;
  const box=document.getElementById('rech-box'),lbl=document.getElementById('rech-label'),wrap=document.getElementById('rech-wrap');
  if(c){box.style.background='var(--accent)';box.style.borderColor='var(--accent)';box.innerHTML='<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';lbl.textContent='Recharged Day';lbl.style.color='var(--accent)';lbl.style.fontWeight='600';wrap.style.borderColor='var(--accent)';wrap.style.background='var(--accent-light)';}
  else{box.style.background='var(--surface)';box.style.borderColor='var(--border)';box.innerHTML='';lbl.textContent='Not a recharge day';lbl.style.color='var(--text-muted)';lbl.style.fontWeight='500';wrap.style.borderColor='var(--border)';wrap.style.background='var(--surface)';}
  document.getElementById('rech-field').style.display=c?'flex':'none';
}
async function saveReading(){
  const balance=parseFloat(document.getElementById('u-balance').value);const notes=document.getElementById('u-notes').value.trim();
  const isR=document.getElementById('u-is-rech')?.checked||false;const rAmt=isR?parseFloat(document.getElementById('u-rech-amt')?.value||0):0;
  if(isNaN(balance)||balance<0){showToast('Enter a valid balance');return;}
  if(isR&&(!rAmt||rAmt<=0)){showToast('Enter recharge amount');return;}
  const{error}=await sb.from('utility_readings').upsert({type:utilType,reading_date:today(),balance,notes:notes||null,is_recharge:isR,recharge_amount:isR?rAmt:0},{onConflict:'type,reading_date'});
  if(error){showToast('Error: '+error.message);return;}
  showToast('✓ Reading saved!');renderUtility();
}

// ── MANAGE ───────────────────────────────────────────────
async function renderManage(){
  let catHtml=categories.length?categories.map(c=>{const b=budgets.find(bg=>bg.category_id===c.id);return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);"><span style="font-weight:500;">${c.name}</span><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:12px;color:var(--text-muted);">${b?'Budget: '+fmt(b.monthly_limit):''}</span><button class="edit-btn" onclick="editBudget('${c.id}','${esc(c.name)}',${b?b.monthly_limit:0})">💰</button><button class="delete-btn" onclick="deleteCategory('${c.id}','${esc(c.name)}')">🗑</button></div></div>`;}).join(''):`<div style="font-size:13px;color:var(--text-muted);padding:8px 0;">No categories yet.</div>`;
  let medHtml=mediums.length?mediums.map(m=>`<span class="cat-tag">${m.name} <button class="cat-tag-del" onclick="deleteMedium('${m.id}','${esc(m.name)}')">×</button></span>`).join(''):`<span style="font-size:13px;color:var(--text-muted);">No mediums yet.</span>`;
  // Recurring items
  const{data:recurring}=await sb.from('expense_entries').select('item_name,recur_interval,purchased_at').eq('is_recurring',true).order('purchased_at',{ascending:false});
  const seenR=new Set();const recurItems=(recurring||[]).filter(r=>{if(seenR.has(r.item_name))return false;seenR.add(r.item_name);return true;});
  let recurHtml=recurItems.length?recurItems.map(r=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);"><div><div style="font-weight:500;font-size:14px;">${r.item_name}</div><div style="font-size:12px;color:var(--text-muted);">Every ${r.recur_interval} · Last: ${fmtShort(r.purchased_at)}</div></div><span class="recur-badge">🔁</span></div>`).join(''):`<div style="font-size:13px;color:var(--text-muted);padding:8px 0;">No recurring items.</div>`;
  document.getElementById('main').innerHTML=`
    <div class="card"><div class="card-title">📁 Expense Categories — ${ctx}</div>
      ${catHtml}
      <div style="display:flex;gap:8px;margin-top:12px;"><input type="text" id="new-cat" placeholder="New category…" style="flex:1;"/><button class="btn btn-primary btn-sm" onclick="addCategory()">Add</button></div>
    </div>
    <div class="card"><div class="card-title">💳 Payment Mediums</div>
      <div style="margin-bottom:12px;">${medHtml}</div>
      <div style="display:flex;gap:8px;"><input type="text" id="new-med" placeholder="e.g. Cash, bKash, Credit Card…" style="flex:1;"/><button class="btn btn-exp btn-sm" onclick="addMedium()">Add</button></div>
    </div>
    <div class="card"><div class="card-title">🔁 Recurring Items</div>${recurHtml}</div>
    <div class="card"><div style="font-size:13px;color:var(--text-muted);">Switch 🏠/🏢 above to manage categories for each context.</div></div>`;
}
async function addCategory(){const name=document.getElementById('new-cat').value.trim();if(!name)return;const{error}=await sb.from('categories').insert({name,context:ctx});if(error){showToast('Error');return;}showToast(`✓ "${name}" added`);await loadMeta();renderManage();}
async function deleteCategory(id,name){if(!confirm(`Delete "${name}"?`))return;await sb.from('categories').delete().eq('id',id);showToast('Deleted');await loadMeta();renderManage();}
async function addMedium(){const name=document.getElementById('new-med').value.trim();if(!name)return;const{error}=await sb.from('expense_mediums').insert({name});if(error){showToast('Error');return;}showToast(`✓ "${name}" added`);await loadMeta();renderManage();}
async function deleteMedium(id,name){if(!confirm(`Delete "${name}"?`))return;await sb.from('expense_mediums').delete().eq('id',id);showToast('Deleted');await loadMeta();renderManage();}

function editBudget(catId,catName,current){
  showModal(`<div class="modal"><div class="modal-header"><div class="modal-title">💰 Budget — ${catName}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Monthly Budget (৳)</label><input type="number" id="budget-amt" value="${current||''}" placeholder="0" inputmode="decimal"/></div>
      <div style="font-size:13px;color:var(--text-muted);">You'll get an alert in Expenses tab when spending reaches 80% of this limit.</div>
    </div>
    <div class="modal-footer">
      ${current?`<button class="btn btn-danger-outline btn-sm" onclick="deleteBudget('${catId}')">Remove</button>`:''}
      <button class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-exp btn-sm" style="flex:1;" onclick="saveBudget('${catId}')">Save</button>
    </div></div>`);
}
async function saveBudget(catId){
  const amt=parseFloat(document.getElementById('budget-amt').value);if(!amt||amt<=0){showToast('Enter valid amount');return;}
  await sb.from('category_budgets').upsert({category_id:catId,monthly_limit:amt,context:ctx},{onConflict:'category_id,context'});
  showToast('✓ Budget set');closeModal();await loadMeta();renderManage();
}
async function deleteBudget(catId){
  await sb.from('category_budgets').delete().eq('category_id',catId).eq('context',ctx);
  showToast('Budget removed');closeModal();await loadMeta();renderManage();
}

// INIT
async function init(){
  history.pushState(null,'',location.href);
  initTheme();
  document.getElementById('main').innerHTML=`<div class="loading">Loading…</div>`;
  await loadMeta();
  // Load all entries for CSV export
  const{data}=await sb.from('expense_entries').select('*').order('purchased_at',{ascending:false});
  allEntries=data||[];
  appReady=true;
  setPage('items');
}
init();
</script>
</body>
</html>
