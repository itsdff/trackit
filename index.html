<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TrackIt</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#F7F6F3;--surface:#fff;--surface2:#F0EEE9;--border:#E2DDD6;--text:#1A1916;--text-muted:#7A7670;--accent:#2563EB;--accent-light:#EFF6FF;--elec:#F59E0B;--elec-light:#FFFBEB;--gas:#10B981;--gas-light:#ECFDF5;--exp:#8B5CF6;--exp-light:#F5F3FF;--danger:#DC2626;--warn:#D97706;--warn-light:#FFFBEB;--shadow:rgba(0,0,0,0.06);--radius:12px;--radius-sm:8px;}
[data-theme="dark"]{--bg:#0F1117;--surface:#1A1D27;--surface2:#23263A;--border:#2E3348;--text:#F0EEF8;--text-muted:#7B80A0;--accent:#4F8EF7;--accent-light:#1A2644;--elec:#FBBF24;--elec-light:#1F1A00;--gas:#34D399;--gas-light:#052E20;--exp:#A78BFA;--exp-light:#1E1244;--danger:#F87171;--warn:#FCD34D;--warn-light:#1F1500;--shadow:rgba(0,0,0,0.3);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background 0.2s,color 0.2s;}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:100;}
.nav-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;}
.nav-logo{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;}
.nav-logo span{color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:8px;}
.tabs{display:flex;gap:4px;}
.tab{padding:6px 12px;border-radius:20px;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.15s;}
.tab.active{background:var(--accent);color:#fff;}
.theme-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:5px 10px;font-size:14px;cursor:pointer;color:var(--text-muted);}
main{max-width:600px;margin:0 auto;padding:16px 16px 90px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.card-title{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;margin-bottom:12px;}
/* SEARCH */
.search-wrap{position:relative;margin-bottom:10px;}
.search-wrap input{width:100%;padding:12px 16px 12px 42px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:15px;background:var(--surface);color:var(--text);outline:none;transition:border 0.15s;}
.search-wrap input:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);}
.cat-filter{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;}
.cat-filter::-webkit-scrollbar{display:none;}
.cat-chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.cat-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.search-results{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:4px;box-shadow:0 4px 16px var(--shadow);}
.search-result-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);}
.search-result-item:last-child{border-bottom:none;}
.sri-name{font-weight:600;font-size:14px;}
.sri-meta{font-size:12px;color:var(--text-muted);margin-top:2px;}
/* SUMMARY */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.stat-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;}
.stat-value{font-family:'Sora',sans-serif;font-size:22px;font-weight:700;margin-top:4px;}
.stat-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.cat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.cat-name{font-size:13px;font-weight:500;width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cat-bar-wrap{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.cat-bar{height:100%;border-radius:4px;background:var(--accent);}
.cat-amt{font-size:12px;font-weight:600;color:var(--text-muted);width:70px;text-align:right;flex-shrink:0;}
.top-item-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.top-item-row:last-child{border-bottom:none;}
.ti-name{font-size:13px;font-weight:600;}
.ti-meta{font-size:11px;color:var(--text-muted);margin-top:2px;}
.ti-price{font-size:14px;font-weight:700;color:var(--accent);}
/* ALERTS */
.alert{border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;}
.alert.warn{background:var(--warn-light);border:1px solid #FDE68A;}
.alert.danger{background:#FEF2F2;border:1px solid #FECACA;}
[data-theme="dark"] .alert.danger{background:#2D1515;border-color:#7F2020;}
.alert.info{background:var(--accent-light);border:1px solid #BFDBFE;}
.alert.success{background:#F0FDF4;border:1px solid #86EFAC;}
[data-theme="dark"] .alert.success{background:#052E20;border-color:#34D399;}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.alert-text{font-size:13px;line-height:1.5;}
.alert-text strong{font-weight:600;}
/* ITEM DETAIL */
.item-detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.item-detail-header{padding:16px;border-bottom:1px solid var(--border);}
.item-name-big{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;}
.item-price-row{display:flex;align-items:flex-end;justify-content:space-between;margin-top:10px;}
.latest-price{font-family:'Sora',sans-serif;font-size:26px;font-weight:700;color:var(--accent);}
.unit-price-pill{background:var(--accent-light);color:var(--accent);font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;}
.price-label{font-size:11px;color:var(--text-muted);}
.history-row{padding:12px 16px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:72px 1fr auto;gap:8px;align-items:start;}
.history-row:last-child{border-bottom:none;}
.h-date{font-size:12px;color:var(--text-muted);}
.h-price{font-weight:700;font-size:15px;}
.h-unit-price{font-size:11px;color:var(--accent);font-weight:600;margin-top:1px;}
.h-meta{font-size:12px;color:var(--text-muted);margin-top:2px;}
.h-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;align-self:start;}
.h-badge.up{background:#FEE2E2;color:var(--danger);}
.h-badge.down{background:#D1FAE5;color:#065F46;}
[data-theme="dark"] .h-badge.down{background:#052E20;color:#34D399;}
.h-badge.same{background:var(--surface2);color:var(--text-muted);}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:13px;color:var(--accent);font-weight:500;cursor:pointer;margin-bottom:12px;padding:0;}
/* FORM */
.form-sheet{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.form-header{padding:16px;border-bottom:1px solid var(--border);}
.form-body{padding:16px;display:flex;flex-direction:column;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px;}
input,select{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:'Inter',sans-serif;background:var(--surface);color:var(--text);outline:none;transition:border 0.15s;-webkit-appearance:none;}
input:focus,select:focus{border-color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-footer{padding:16px;border-top:1px solid var(--border);display:flex;gap:8px;}
.btn{width:100%;padding:13px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{opacity:0.88;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-sm{width:auto;padding:9px 16px;font-size:14px;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.new-cat-inline{display:flex;gap:8px;margin-top:8px;align-items:center;}
.new-cat-inline input{flex:1;padding:9px 12px;font-size:14px;}
.edit-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;font-size:12px;font-weight:600;color:var(--text-muted);cursor:pointer;}
.delete-btn{background:none;border:1px solid #FECACA;border-radius:var(--radius-sm);padding:5px 10px;font-size:12px;font-weight:600;color:var(--danger);cursor:pointer;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}
.modal-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);padding:4px;}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:14px;}
.modal-footer{padding:16px;border-top:1px solid var(--border);display:flex;gap:8px;}
/* UTILITY */
.util-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.util-btn{padding:12px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--surface);font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s;color:var(--text-muted);}
.util-btn.elec.active{border-color:var(--elec);background:var(--elec-light);color:var(--elec);}
.util-btn.gas.active{border-color:var(--gas);background:var(--gas-light);color:var(--gas);}
.util-hero{border-radius:var(--radius);padding:20px;margin-bottom:12px;}
.util-hero.elec{background:var(--elec-light);border:1px solid #FDE68A;}
.util-hero.gas{background:var(--gas-light);border:1px solid #6EE7B7;}
.util-hero-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);}
.util-hero-value{font-family:'Sora',sans-serif;font-size:32px;font-weight:700;margin:4px 0;}
.util-hero-value.elec{color:var(--elec);}
.util-hero-value.gas{color:var(--gas);}
.util-hero-sub{font-size:12px;color:var(--text-muted);}
.util-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.util-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;}
.util-stat-label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;}
.util-stat-value{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;margin-top:4px;}
.util-stat-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.reading-row{padding:10px 16px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:80px 1fr 1fr;gap:8px;align-items:center;}
.reading-row:last-child{border-bottom:none;}
.rr-date{font-size:12px;color:var(--text-muted);}
.rr-balance{font-weight:700;font-size:14px;}
.rr-consumed{font-size:12px;color:var(--text-muted);text-align:right;}
.rr-consumed.high{color:var(--danger);font-weight:600;}
.rr-interp{font-size:10px;color:var(--text-muted);font-style:italic;}
/* EXPENSE */
.exp-hero{background:var(--exp-light);border:1px solid var(--exp);border-radius:var(--radius);padding:20px;margin-bottom:12px;text-align:center;}
.exp-hero-label{font-size:11px;font-weight:600;color:var(--exp);text-transform:uppercase;letter-spacing:0.5px;}
.exp-hero-value{font-family:'Sora',sans-serif;font-size:36px;font-weight:700;color:var(--exp);margin:6px 0;}
.exp-hero-sub{font-size:12px;color:var(--text-muted);}
.medium-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.medium-name{font-weight:600;font-size:15px;}
.medium-meta{font-size:12px;color:var(--text-muted);margin-top:2px;}
.medium-amount{font-family:'Sora',sans-serif;font-size:20px;font-weight:700;color:var(--exp);text-align:right;}
.medium-count{font-size:11px;color:var(--text-muted);margin-top:2px;text-align:right;}
.adjust-btn{width:100%;padding:16px;border:2px dashed var(--exp);border-radius:var(--radius);background:transparent;color:var(--exp);font-size:15px;font-weight:700;cursor:pointer;text-align:center;transition:all 0.15s;margin-bottom:12px;}
.adjust-btn:hover{background:var(--exp-light);}
.exp-entry-row{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.exp-entry-row:last-child{border-bottom:none;}
.exp-entry-info{flex:1;}
.exp-entry-name{font-weight:600;font-size:14px;}
.exp-entry-meta{font-size:12px;color:var(--text-muted);margin-top:2px;}
.exp-entry-right{text-align:right;flex-shrink:0;}
.exp-entry-amount{font-weight:700;font-size:15px;color:var(--exp);}
.exp-entry-medium{font-size:11px;color:var(--text-muted);margin-top:2px;}
.adj-badge{display:inline-flex;align-items:center;gap:6px;background:var(--gas-light);border:1px solid var(--gas);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:8px;width:100%;}
.adj-badge-text{font-size:13px;color:var(--gas);font-weight:600;}
/* MANAGE */
.cat-tag{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border-radius:20px;padding:4px 12px;font-size:13px;margin:4px;}
.cat-tag-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;line-height:1;}
/* MONTH FILTER */
.month-filter{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;}
.month-filter::-webkit-scrollbar{display:none;}
.month-chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.month-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
/* SUB NAV */
.sub-nav{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:14px;scrollbar-width:none;}
.sub-nav::-webkit-scrollbar{display:none;}
.sub-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.sub-btn.active{background:var(--exp);border-color:var(--exp);color:#fff;}
/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 10px;font-size:9px;font-weight:600;color:var(--text-muted);cursor:pointer;gap:3px;transition:color 0.15s;border:none;background:none;}
.bnav-item.active{color:var(--accent);}
.bnav-item.exp-tab.active{color:var(--exp);}
.bnav-icon{font-size:18px;}
/* MISC */
.empty{text-align:center;padding:40px 20px;color:var(--text-muted);}
.empty-icon{font-size:36px;margin-bottom:8px;}
.empty p{font-size:14px;}
.loading{text-align:center;padding:30px;color:var(--text-muted);font-size:14px;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1916;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
[data-theme="dark"] .toast{background:#F0EEF8;color:#0F1117;}
.toast.show{opacity:1;}
body.keyboard-open .bottom-nav{display:none;}
body.keyboard-open main{padding-bottom:16px;}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="nav-logo">track<span>it</span></div>
    <div class="nav-right">
      <div class="tabs">
        <button class="tab active" onclick="switchContext('Home')">🏠 Home</button>
        <button class="tab" onclick="switchContext('Office')">🏢 Office</button>
      </div>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>
  </div>
</nav>
<main id="main"></main>
<div class="bottom-nav">
  <button class="bnav-item active" id="bnav-search" onclick="setPage('search')"><span class="bnav-icon">🔍</span>Search</button>
  <button class="bnav-item" id="bnav-add" onclick="setPage('add')"><span class="bnav-icon">➕</span>Add</button>
  <button class="bnav-item" id="bnav-tracker" onclick="setPage('tracker')"><span class="bnav-icon">📦</span>Items</button>
  <button class="bnav-item exp-tab" id="bnav-expenses" onclick="setPage('expenses')"><span class="bnav-icon">💸</span>Expenses</button>
  <button class="bnav-item" id="bnav-utility" onclick="setPage('utility')"><span class="bnav-icon">⚡</span>Utils</button>
  <button class="bnav-item" id="bnav-manage" onclick="setPage('manage')"><span class="bnav-icon">⚙️</span>Manage</button>
</div>
<div id="modal-container"></div>
<div class="toast" id="toast"></div>
<script>
const SUPABASE_URL='https://vdbsyriaxijphnqkcbag.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkYnN5cmlheGlqcGhucWtjYmFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMzc1MzUsImV4cCI6MjA5NjkxMzUzNX0.yTbee4O0G8ypAX2363mOdlFr2p0neYQSq4j8eXrySCk';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const UNITS=['pcs','kg','g','litre','ml','pack','box','dozen','roll','bottle','bag','sheet','metre'];
const ELEC_DEMAND_CHARGE=6*42,ELEC_ALERT_THRESHOLD=80,GAS_METER_CHARGE=200,GAS_RATE=18;

let currentContext='Home',currentPage='search',currentUtilType='electricity';
let categories=[],expMediums=[],searchTimeout=null;
let selectedMonth=new Date().toISOString().slice(0,7);
let selectedCatFilter='all',expSubPage='summary';

// BACK BUTTON
window.addEventListener('popstate',()=>{
  if(currentPage!=='search'){setPage('search');history.pushState(null,'',location.href);}
  else history.pushState(null,'',location.href);
});

// THEME
function initTheme(){const s=localStorage.getItem('trackit-theme')||'light';document.documentElement.setAttribute('data-theme',s);document.getElementById('theme-btn').textContent=s==='dark'?'☀️':'🌙';}
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme'),n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('trackit-theme',n);document.getElementById('theme-btn').textContent=n==='dark'?'☀️':'🌙';}

// KEYBOARD FIX
if(window.visualViewport){let lH=window.visualViewport.height;window.visualViewport.addEventListener('resize',()=>{const h=window.visualViewport.height;if(h<lH-100){document.body.classList.add('keyboard-open');setTimeout(()=>{const e=document.activeElement;if(e)e.scrollIntoView({behavior:'smooth',block:'center'});},100);}else document.body.classList.remove('keyboard-open');lH=h;});}

function switchContext(ctx){currentContext=ctx;selectedCatFilter='all';document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&ctx==='Home')||(i===1&&ctx==='Office')));loadCategories().then(()=>render());}
function setPage(p){currentPage=p;document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));const btn=document.getElementById('bnav-'+p);if(btn)btn.classList.add('active');render();}
async function loadCategories(){const{data}=await sb.from('categories').select('*').eq('context',currentContext).order('name');categories=data||[];}
async function loadExpMediums(){const{data}=await sb.from('expense_mediums').select('*').order('name');expMediums=data||[];}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function fmt(n){return '৳'+Number(n).toLocaleString('en-BD');}
function fmtDate(d){return new Date(d).toLocaleDateString('en-BD',{day:'numeric',month:'short',year:'numeric'});}
function fmtDateShort(d){return new Date(d).toLocaleDateString('en-BD',{day:'numeric',month:'short'});}
function calcUnitPrice(price,qty,unit){
  if(!qty||qty<=0||!unit)return null;
  const p=price/qty;
  const r={perUnit:fmt(Math.round(p*100)/100)+' / '+unit,standardRate:null,standardUnit:null};
  if(unit==='g'){r.standardRate=fmt(Math.round(p*1000));r.standardUnit='kg';}
  else if(unit==='ml'){r.standardRate=fmt(Math.round(p*1000));r.standardUnit='litre';}
  else if(['kg','litre','pcs','pack','box','bottle','bag','roll','sheet','dozen','metre'].includes(unit)){r.standardRate=fmt(Math.round(p*100)/100);r.standardUnit=unit==='pcs'?'pc':unit;}
  return r;
}
function getMonths(){const m=[],now=new Date();for(let i=0;i<6;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);m.push({label:d.toLocaleDateString('en-BD',{month:'short',year:'numeric'}),value:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`});}return m;}
function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function today(){return new Date().toISOString().split('T')[0];}
function daysInMonth(ym){const[y,m]=ym.split('-').map(Number);return new Date(y,m,0).getDate();}
function render(){
  if(currentPage==='search')renderSearch();
  else if(currentPage==='add')renderAdd();
  else if(currentPage==='tracker')renderTracker();
  else if(currentPage==='expenses')renderExpenses();
  else if(currentPage==='utility')renderUtility();
  else if(currentPage==='manage')renderManage();
}

function renderSearch(){
  const catChips=`<div class="cat-chip ${selectedCatFilter==='all'?'active':''}" onclick="filterCat('all')">All</div>`+categories.map(c=>`<div class="cat-chip ${selectedCatFilter===c.id?'active':''}" onclick="filterCat('${c.id}')">${c.name}</div>`).join('');

    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

function filterCat(catId){selectedCatFilter=catId;document.querySelectorAll('.cat-chip').forEach(c=>{const isAll=c.textContent==='All';c.classList.toggle('active',(isAll&&catId==='all')||(!isAll&&categories.find(cat=>cat.id===catId&&cat.name===c.textContent)));});loadRecent();}
async function loadRecent(){
  let catIds=categories.map(c=>c.id);if(selectedCatFilter!=='all')catIds=[selectedCatFilter];
  if(!catIds.length){document.getElementById('recent-section').innerHTML=`<div class="empty"><div class="empty-icon">📦</div><p>No items yet.</p></div>`;return;}
  const{data:items}=await sb.from('items').select('id,name,category_id').in('category_id',catIds).order('created_at',{ascending:false}).limit(30);
  if(!items?.length){document.getElementById('recent-section').innerHTML=`<div class="empty"><div class="empty-icon">📦</div><p>No items yet. Log your first purchase!</p></div>`;return;}
  const itemIds=items.map(i=>i.id);
  const{data:purchases}=await sb.from('purchases').select('item_id,price,quantity,unit,purchased_at').in('item_id',itemIds).order('purchased_at',{ascending:false});
  const latestMap={};(purchases||[]).forEach(p=>{if(!latestMap[p.item_id])latestMap[p.item_id]=p;});
  const catMap=Object.fromEntries(categories.map(c=>[c.id,c.name]));
  const label=selectedCatFilter==='all'?'Purchase History':(catMap[selectedCatFilter]||'Items');
  let html=`<div style="font-size:13px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">${label}</div>`;
  items.forEach(item=>{
    const lp=latestMap[item.id];const uObj=lp?calcUnitPrice(lp.price,lp.quantity,lp.unit):null;
    const qtyLabel=lp&&lp.quantity&&lp.unit?`${lp.quantity} ${lp.unit}`:'';
    const stdRate=uObj&&uObj.standardRate?`${uObj.standardRate} / ${uObj.standardUnit}`:'';
    html+=`<div class="card" style="padding:12px 16px;cursor:pointer;margin-bottom:8px;" onclick="showItemDetail('${item.id}','${esc(item.name)}')">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <div><div style="font-weight:600;font-size:14px;">${item.name}</div><div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${catMap[item.category_id]||''}</div>${qtyLabel?`<div style="font-size:12px;color:var(--text-muted);margin-top:1px;">Bought: ${qtyLabel}</div>`:''}</div>
        <div style="text-align:right;flex-shrink:0;">${lp?`<div style="font-weight:700;font-size:16px;color:var(--accent);">${fmt(lp.price)}</div>${stdRate?`<div style="font-size:11px;color:var(--accent);font-weight:600;margin-top:1px;">${stdRate}</div>`:''}<div style="font-size:11px;color:var(--text-muted);margin-top:1px;">${fmtDate(lp.purchased_at)}</div>`:`<div style="font-size:12px;color:var(--text-muted);">No purchases</div>`}</div>
      </div></div>`;
  });
  document.getElementById('recent-section').innerHTML=html;
}
async function handleSearch(q){
  clearTimeout(searchTimeout);
  if(!q.trim()){document.getElementById('search-results').innerHTML='';loadRecent();return;}
  document.getElementById('recent-section').innerHTML='';
  searchTimeout=setTimeout(async()=>{
    let catIds=categories.map(c=>c.id);if(selectedCatFilter!=='all')catIds=[selectedCatFilter];
    if(!catIds.length)return;
    const{data:items}=await sb.from('items').select('id,name,category_id').in('category_id',catIds).ilike('name',`%${q}%`).limit(10);
    if(!items?.length){document.getElementById('search-results').innerHTML=`<div class="empty"><div class="empty-icon">🔎</div><p>No items found for "${q}"</p></div>`;return;}
    const catMap=Object.fromEntries(categories.map(c=>[c.id,c.name]));
    const itemIds=items.map(i=>i.id);
    const{data:purchases}=await sb.from('purchases').select('item_id,price,quantity,unit,purchased_at').in('item_id',itemIds).order('purchased_at',{ascending:false});
    const latestMap={};(purchases||[]).forEach(p=>{if(!latestMap[p.item_id])latestMap[p.item_id]=p;});
    let html=`<div class="search-results">`;
    items.forEach(item=>{
      const lp=latestMap[item.id];const uObj=lp?calcUnitPrice(lp.price,lp.quantity,lp.unit):null;
      const qtyLabel=lp&&lp.quantity&&lp.unit?`${lp.quantity} ${lp.unit}`:'';
      const stdRate=uObj&&uObj.standardRate?` · ${uObj.standardRate}/${uObj.standardUnit}`:'';
      html+=`<div class="search-result-item" onclick="showItemDetail('${item.id}','${esc(item.name)}')"><div class="sri-name">${item.name}</div><div class="sri-meta">${catMap[item.category_id]||''}${lp?' · '+fmt(lp.price)+(qtyLabel?' for '+qtyLabel:'')+stdRate+' · '+fmtDate(lp.purchased_at):' · No purchases yet'}</div></div>`;
    });
    document.getElementById('search-results').innerHTML=html+'</div>';
  },300);
}
async function showItemDetail(itemId,itemName){
  const el=document.getElementById('main');
  el.innerHTML=`<button class="back-btn" onclick="setPage('search')">← Back</button><div class="loading">Loading…</div>`;
  const{data:purchases}=await sb.from('purchases').select('*').eq('item_id',itemId).order('purchased_at',{ascending:false});
  if(!purchases?.length){el.innerHTML=`<button class="back-btn" onclick="setPage('search')">← Back</button><div class="item-detail"><div class="item-detail-header"><div class="item-name-big">${itemName}</div></div><div class="empty"><p>No purchases yet.</p></div></div>`;return;}
  const latest=purchases[0];const latestUObj=calcUnitPrice(latest.price,latest.quantity,latest.unit);
  const latestStdRate=latestUObj&&latestUObj.standardRate?`${latestUObj.standardRate} / ${latestUObj.standardUnit}`:null;
  const latestQtyLabel=latest.quantity&&latest.unit?`${latest.quantity} ${latest.unit}`:'';
  let html=`<button class="back-btn" onclick="setPage('search')">← Back</button>
    <div class="item-detail"><div class="item-detail-header">
      <div class="item-name-big">${itemName}</div>
      <div class="item-price-row">
        <div><div class="price-label">Last bought${latestQtyLabel?' · '+latestQtyLabel:''}</div><div class="latest-price">${fmt(latest.price)}</div><div class="price-label">${fmtDate(latest.purchased_at)}</div></div>
        ${latestStdRate?`<div class="unit-price-pill">📦 ${latestStdRate}</div>`:''}
      </div></div><div>`;
  purchases.forEach((p,i)=>{
    const prev=purchases[i+1];let badge='';
    if(prev){const diff=((p.price-prev.price)/prev.price)*100;if(diff>5)badge=`<span class="h-badge up">↑${Math.round(diff)}%</span>`;else if(diff<-5)badge=`<span class="h-badge down">↓${Math.abs(Math.round(diff))}%</span>`;else badge=`<span class="h-badge same">≈same</span>`;}
    const uObj=calcUnitPrice(p.price,p.quantity,p.unit);
    const qtyLabel=p.quantity&&p.unit?`${p.quantity} ${p.unit}`:'';
    const stdRate=uObj&&uObj.standardRate?`${uObj.standardRate} / ${uObj.standardUnit}`:null;
    const meta=[p.vendor||null,p.notes||null].filter(Boolean).join(' · ');
    html+=`<div class="history-row"><div class="h-date">${fmtDate(p.purchased_at)}</div>
      <div class="h-main"><div class="h-price">${fmt(p.price)}${qtyLabel?` <span style="font-size:12px;font-weight:400;color:var(--text-muted);">for ${qtyLabel}</span>`:''}</div>
      ${stdRate?`<div class="h-unit-price">≈ ${stdRate}</div>`:''}${meta?`<div class="h-meta">${meta}</div>`:''}</div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;">${badge}
        <button class="edit-btn" onclick="openEditPurchase('${p.id}','${esc(itemName)}','${itemId}')">✏️</button>
        <button class="delete-btn" onclick="deletePurchase('${p.id}','${itemId}','${esc(itemName)}')">🗑</button>
      </div></div>`;
  });
  el.innerHTML=html+'</div></div>';
}
async function openEditPurchase(purchaseId,itemName,itemId){
  const{data:p}=await sb.from('purchases').select('*').eq('id',purchaseId).single();if(!p)return;
  const unitOpts=UNITS.map(u=>`<option value="${u}" ${p.unit===u?'selected':''}>${u}</option>`).join('');
  showModal(`<div class="modal"><div class="modal-header"><div class="modal-title">Edit — ${itemName}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Price (৳)</label><input type="number" id="ep-price" value="${p.price}" inputmode="decimal"/></div>
      <div class="form-row"><div class="form-group"><label>Quantity</label><input type="number" id="ep-qty" value="${p.quantity||''}" step="any" inputmode="decimal"/></div>
      <div class="form-group"><label>Unit</label><select id="ep-unit"><option value="">—</option>${unitOpts}</select></div></div>
      <div class="form-group"><label>Date</label><input type="date" id="ep-date" value="${p.purchased_at}"/></div>
      <div class="form-group"><label>Vendor</label><input type="text" id="ep-vendor" value="${p.vendor||''}"/></div>
      <div class="form-group"><label>Notes</label><input type="text" id="ep-notes" value="${p.notes||''}"/></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary btn-sm" style="flex:1;" onclick="saveEditPurchase('${purchaseId}','${itemId}','${esc(itemName)}')">Save</button></div></div>`);
}
async function saveEditPurchase(purchaseId,itemId,itemName){
  const price=parseFloat(document.getElementById('ep-price').value);
  const qty=parseFloat(document.getElementById('ep-qty').value)||null;
  const unit=document.getElementById('ep-unit').value||null;
  const date=document.getElementById('ep-date').value;
  const vendor=document.getElementById('ep-vendor').value.trim()||null;
  const notes=document.getElementById('ep-notes').value.trim()||null;
  if(!price||price<=0){showToast('Enter a valid price');return;}
  const{error}=await sb.from('purchases').update({price,quantity:qty,unit,purchased_at:date,vendor,notes}).eq('id',purchaseId);
  if(error){showToast('Error saving');return;}
  showToast('✓ Updated!');closeModal();showItemDetail(itemId,itemName);
}
async function deletePurchase(purchaseId,itemId,itemName){
  if(!confirm('Delete this purchase entry?'))return;
  await sb.from('purchases').delete().eq('id',purchaseId);
  showToast('Deleted');showItemDetail(itemId,itemName);
}

function handleCatChange(val){const w=document.getElementById('new-cat-wrap');if(val==='__new__'){w.style.display='flex';document.getElementById('f-new-cat').focus();}else w.style.display='none';}
async function saveInlineCat(){
  const name=document.getElementById('f-new-cat').value.trim();if(!name)return;
  const{data,error}=await sb.from('categories').insert({name,context:currentContext}).select().single();
  if(error){showToast('Error');return;}
  await loadCategories();showToast(`✓ "${name}" added`);
  const sel=document.getElementById('f-cat');const opt=document.createElement('option');opt.value=data.id;opt.textContent=name;
  sel.insertBefore(opt,sel.querySelector('option[value="__new__"]'));sel.value=data.id;
  document.getElementById('new-cat-wrap').style.display='none';
}
function cancelInlineCat(){document.getElementById('f-cat').value='';document.getElementById('new-cat-wrap').style.display='none';}
function updateUnitPreview(){
  const price=parseFloat(document.getElementById('f-price')?.value);
  const qty=parseFloat(document.getElementById('f-qty')?.value);
  const unit=document.getElementById('f-unit')?.value;
  const el=document.getElementById('unit-preview');if(!el)return;
  const uObj=calcUnitPrice(price,qty,unit);if(!uObj){el.textContent='';return;}
  el.textContent=uObj.standardRate&&uObj.standardUnit!==unit?`${uObj.perUnit} · ${uObj.standardRate} / ${uObj.standardUnit}`:uObj.perUnit;
}
async function fetchItemSuggestions(q){
  if(!q||q.length<2)return;const catIds=categories.map(c=>c.id);if(!catIds.length)return;
  const{data}=await sb.from('items').select('name').in('category_id',catIds).ilike('name',`%${q}%`).limit(8);
  const dl=document.getElementById('item-suggestions');if(dl)dl.innerHTML=(data||[]).map(i=>`<option value="${i.name}">`).join('');
}
async function saveEntry(){
  const itemName=document.getElementById('f-item').value.trim();
  const catId=document.getElementById('f-cat').value;
  const medId=document.getElementById('f-med').value;
  const price=parseFloat(document.getElementById('f-price').value);
  const qty=parseFloat(document.getElementById('f-qty').value)||1;
  const unit=document.getElementById('f-unit').value;
  const vendor=document.getElementById('f-vendor').value.trim();
  const notes=document.getElementById('f-notes').value.trim();
  if(!itemName){showToast('Please enter an item name');return;}
  if(!catId||catId==='__new__'){showToast('Please select a category');return;}
  if(!price||price<=0){showToast('Please enter a valid amount');return;}
  if(!medId){showToast('Please select a payment medium');return;}
  // Save to purchases (item tracker)
  let{data:existing}=await sb.from('items').select('id').eq('name',itemName).eq('category_id',catId).limit(1);
  let itemId;
  if(existing?.length){itemId=existing[0].id;}
  else{const{data:ni}=await sb.from('items').insert({name:itemName,category_id:catId}).select().single();itemId=ni.id;}
  await sb.from('purchases').insert({item_id:itemId,price,quantity:qty,unit:unit||null,purchased_at:today(),vendor:vendor||null,notes:notes||null});
  // Save to expense_entries
  await sb.from('expense_entries').insert({item_name:itemName,category_id:catId,amount:price,quantity:qty,unit:unit||null,medium_id:medId,note:notes||null});
  showToast('✓ Entry saved!');renderAdd();
}

// ── ITEM TRACKER ──────────────────────────────────────────
async function renderTracker(){
  const el=document.getElementById('main');
  el.innerHTML=`<div class="loading">Loading…</div>`;
  // Load from expense_entries — grouped by item_name
  const{data:entries}=await sb.from('expense_entries').select('*').order('entered_at',{ascending:false});
  if(!entries?.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📦</div><p>No entries yet. Start logging purchases in Add tab.</p></div>`;return;}
  // Group by item_name
  const itemMap={};
  (entries||[]).forEach(e=>{
    if(!itemMap[e.item_name]){itemMap[e.item_name]={entries:[],latestDate:e.entered_at,category_id:e.category_id};}
    itemMap[e.item_name].entries.push(e);
  });
  const catMap=Object.fromEntries(categories.map(c=>[c.id,c.name]));
  const medMap=Object.fromEntries(expMediums.map(m=>[m.id,m.name]));
  // Search
  const searchEl=`<div class="search-wrap" style="margin-bottom:12px;">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="tracker-search" placeholder="Search items…" oninput="filterTracker(this.value)" autocomplete="off"/>
  </div>`;
  let html=searchEl+`<div id="tracker-list">`;
  Object.entries(itemMap).forEach(([name,data])=>{
    const latest=data.entries[0];
    const uObj=calcUnitPrice(latest.amount,latest.quantity,latest.unit);
    const stdRate=uObj&&uObj.standardRate?`${uObj.standardRate} / ${uObj.standardUnit}`:'';
    const qtyLabel=latest.quantity&&latest.unit?`${latest.quantity} ${latest.unit}`:'';
    html+=`<div class="card" style="padding:12px 16px;cursor:pointer;margin-bottom:8px;" onclick="showTrackerDetail('${esc(name)}')">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <div><div style="font-weight:600;font-size:14px;">${name}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${catMap[data.category_id]||''}</div>
          ${qtyLabel?`<div style="font-size:12px;color:var(--text-muted);margin-top:1px;">Bought: ${qtyLabel}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-weight:700;font-size:16px;color:var(--exp);">${fmt(latest.amount)}</div>
          ${stdRate?`<div style="font-size:11px;color:var(--exp);font-weight:600;margin-top:1px;">${stdRate}</div>`:''}
          <div style="font-size:11px;color:var(--text-muted);margin-top:1px;">${fmtDateShort(latest.entered_at)}</div>
        </div>
      </div></div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
}
function filterTracker(q){
  const rows=document.querySelectorAll('#tracker-list .card');
  rows.forEach(r=>{const name=r.querySelector('div[style*="font-weight:600"]')?.textContent||'';r.style.display=name.toLowerCase().includes(q.toLowerCase())?'':'none';});
}

    const uObjE=calcUnitPrice(e.amount,e.quantity,e.unit);

async function renderExpSummary(el){
  // Get last adjustment time
  const{data:adjs}=await sb.from('account_adjustments').select('*').order('adjusted_at',{ascending:false}).limit(1);
  const lastAdj=adjs&&adjs.length?adjs[0]:null;
  const since=lastAdj?lastAdj.adjusted_at:null;
  // Get all entries since last adjustment
  let query=sb.from('expense_entries').select('*');
  if(since)query=query.gte('entered_at',since);
  const{data:entries}=await query.order('entered_at',{ascending:false});
  const medMap=Object.fromEntries(expMediums.map(m=>[m.id,m.name]));
  const total=(entries||[]).reduce((s,e)=>s+e.amount,0);
  const byMed={};
  (entries||[]).forEach(e=>{const k=e.medium_id||'__none__';byMed[k]=(byMed[k]||{total:0,count:0});byMed[k].total+=e.amount;byMed[k].count++;});
  const sinceLabel=since?`since ${fmtDate(since)}`:'all time';
  let html=`
    <div class="exp-hero">
      <div class="exp-hero-label">Total Spent</div>
      <div class="exp-hero-value">${fmt(total)}</div>
      <div class="exp-hero-sub">${sinceLabel} · ${(entries||[]).length} entries</div>
    </div>
    ${lastAdj?`<div class="adj-badge"><span style="font-size:16px;">✅</span><div class="adj-badge-text">Last adjusted: ${fmtDate(lastAdj.adjusted_at)}${lastAdj.note?' — '+lastAdj.note:''}</div></div>`:''}`;
  if(expMediums.length){
    expMediums.forEach(m=>{
      const d=byMed[m.id]||{total:0,count:0};
      html+=`<div class="medium-card">
        <div><div class="medium-name">${m.name}</div><div class="medium-meta">${d.count} transactions</div></div>
        <div><div class="medium-amount">${fmt(d.total)}</div><div class="medium-count">${sinceLabel}</div></div>

    });

    html+=`<div class="empty"><div class="empty-icon">💳</div><p>No payment mediums yet. Add them in ⚙️ Manage.</p></div>`;
  }
  html+=`<button class="adjust-btn" onclick="markAccountsAdjusted()">✅ Accounts Adjusted</button>`;
  el.innerHTML=html;
}

// ── UTILITY ──────────────────────────────────────────────
async function renderUtility(){
  const el=document.getElementById('main');el.innerHTML=`<div class="loading">Loading…</div>`;
  const dbType=currentUtilType==='electricity'?'electricity':'gas';
  const{data:readings}=await sb.from('utility_readings').select('*').eq('type',dbType).order('reading_date',{ascending:true});
  const filled=fillGaps(readings||[]);
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const prevYm=(()=>{const d=new Date(now.getFullYear(),now.getMonth()-1,1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;})();
  const monthR=filled.filter(r=>r.reading_date.startsWith(ym));
  const prevMonthR=filled.filter(r=>r.reading_date.startsWith(prevYm));
  function consumption(rs){
    const sorted=rs.slice().sort((a,b)=>a.reading_date.localeCompare(b.reading_date));
    const days=[];
    for(let i=1;i<sorted.length;i++){const adj=sorted[i].is_recharge?(sorted[i].recharge_amount||0):0;const c=(sorted[i-1].balance+adj)-sorted[i].balance;if(c>0)days.push({date:sorted[i].reading_date,consumed:c});}
    return days;
  }
  const curDays=consumption(monthR),prevDays=consumption(prevMonthR);
  const avgDaily=curDays.length?curDays.reduce((s,d)=>s+d.consumed,0)/curDays.length:0;
  const prevAvg=prevDays.length?prevDays.reduce((s,d)=>s+d.consumed,0)/prevDays.length:0;
  const latestR=(readings||[]).length?readings[readings.length-1]:null;
  const curBal=latestR?latestR.balance:null;
  const totalDays=daysInMonth(ym),daysLeft=totalDays-now.getDate();
  const totalRecharged=(readings||[]).filter(r=>r.reading_date.startsWith(ym)&&r.is_recharge&&r.recharge_amount>0).reduce((s,r)=>s+(r.recharge_amount||0),0);
  const isGas=currentUtilType==='gas';
  const unit=isGas?'m³':'৳';
  let costInfo='',alertHtml='';
  if(!isGas){
    const estBill=avgDaily*totalDays+ELEC_DEMAND_CHARGE;
    const recAmt=(avgDaily*daysLeft+ELEC_DEMAND_CHARGE)*1.15;
    costInfo=`<div class="util-grid"><div class="util-stat"><div class="util-stat-label">Avg/Day</div><div class="util-stat-value">${fmt(Math.round(avgDaily))}</div><div class="util-stat-sub">consumed</div></div><div class="util-stat"><div class="util-stat-label">Demand Charge</div><div class="util-stat-value">${fmt(ELEC_DEMAND_CHARGE)}</div><div class="util-stat-sub">fixed</div></div><div class="util-stat"><div class="util-stat-label">Est. Month Total</div><div class="util-stat-value">${fmt(Math.round(estBill))}</div><div class="util-stat-sub">usage+demand</div></div><div class="util-stat"><div class="util-stat-label">Recharged</div><div class="util-stat-value">${fmt(totalRecharged)}</div><div class="util-stat-sub">this month</div></div></div>`;
    if(curBal!==null){const dUA=avgDaily>0?Math.floor((curBal-ELEC_ALERT_THRESHOLD)/avgDaily):null;const rD=dUA!==null?new Date(Date.now()+dUA*86400000).toLocaleDateString('en-BD',{day:'numeric',month:'short'}):'—';if(curBal<ELEC_ALERT_THRESHOLD)alertHtml+=`<div class="alert danger"><div class="alert-icon">🚨</div><div class="alert-text"><strong>Recharge now!</strong> Balance ৳${curBal} below ৳${ELEC_ALERT_THRESHOLD}. Top up: <strong>${fmt(Math.round(recAmt))}</strong></div></div>`;else alertHtml+=`<div class="alert info"><div class="alert-icon">📅</div><div class="alert-text">Balance hits ৳${ELEC_ALERT_THRESHOLD} in ~<strong>${dUA} days</strong> (${rD}). Recharge: <strong>${fmt(Math.round(recAmt))}</strong></div></div>`;}
    if(prevAvg>0){const diff=((avgDaily-prevAvg)/prevAvg)*100;alertHtml+=`<div class="alert ${diff>0?'danger':'info'}"><div class="alert-icon">${diff>0?'📈':'📉'}</div><div class="alert-text"><strong>Using ${Math.abs(Math.round(diff))}% ${diff>0?'more':'less'} than last month.</strong> Last avg: ${fmt(Math.round(prevAvg))}/day.</div></div>`;}
  } else {
    const projM3=avgDaily*totalDays;const estBill=projM3*GAS_RATE+GAS_METER_CHARGE;const recM3=avgDaily*daysLeft*1.15;const recTk=recM3*GAS_RATE+GAS_METER_CHARGE;
    costInfo=`<div class="util-grid"><div class="util-stat"><div class="util-stat-label">Avg/Day</div><div class="util-stat-value">${avgDaily.toFixed(2)}</div><div class="util-stat-sub">m³</div></div><div class="util-stat"><div class="util-stat-label">Meter Charge</div><div class="util-stat-value">${fmt(GAS_METER_CHARGE)}</div><div class="util-stat-sub">fixed</div></div><div class="util-stat"><div class="util-stat-label">Est. Bill</div><div class="util-stat-value">${fmt(Math.round(estBill))}</div><div class="util-stat-sub">usage+meter</div></div><div class="util-stat"><div class="util-stat-label">Recharged</div><div class="util-stat-value">${totalRecharged.toFixed(1)} m³</div><div class="util-stat-sub">this month</div></div></div>`;
    if(curBal!==null){const dUE=avgDaily>0?Math.floor(curBal/avgDaily):null;if(curBal<avgDaily*3)alertHtml+=`<div class="alert danger"><div class="alert-icon">🚨</div><div class="alert-text"><strong>Recharge now!</strong> Top up <strong>${recM3.toFixed(1)} m³</strong> (~${fmt(Math.round(recTk))})</div></div>`;else{const rD=avgDaily>0?new Date(Date.now()+(dUE-3)*86400000).toLocaleDateString('en-BD',{day:'numeric',month:'short'}):'—';alertHtml+=`<div class="alert info"><div class="alert-icon">📅</div><div class="alert-text">Gas lasts ~<strong>${dUE} days</strong>. Recharge by <strong>${rD}</strong>: <strong>${recM3.toFixed(1)} m³</strong> (~${fmt(Math.round(recTk))})</div></div>`;}}
    if(prevAvg>0){const diff=((avgDaily-prevAvg)/prevAvg)*100;alertHtml+=`<div class="alert ${diff>0?'danger':'info'}"><div class="alert-icon">${diff>0?'📈':'📉'}</div><div class="alert-text"><strong>Using ${Math.abs(Math.round(diff))}% ${diff>0?'more':'less'} than last month.</strong> Last avg: ${prevAvg.toFixed(2)} m³/day.</div></div>`;}
  }
  const recentFilled=filled.slice(-14).reverse();let readingsHtml='';
  recentFilled.forEach((r,i)=>{
    const older=recentFilled[i+1];const adj=r.is_recharge?(r.recharge_amount||0):0;const consumed=older?Math.max(0,(older.balance+adj)-r.balance):null;
    const high=consumed&&avgDaily>0&&consumed>avgDaily*1.5;
    const rBadge=r.is_recharge&&r.recharge_amount>0?`<span style="font-size:10px;background:var(--gas-light);color:var(--gas);border-radius:10px;padding:1px 6px;font-weight:600;margin-left:4px;">+${isGas?r.recharge_amount.toFixed(2):fmt(r.recharge_amount)}</span>`:'';
    readingsHtml+=`<div class="reading-row"><div class="rr-date">${fmtDateShort(r.reading_date)}${r.interpolated?'<br><span class="rr-interp">~est.</span>':''}${rBadge}</div><div class="rr-balance">${r.balance.toFixed(isGas?2:0)} ${unit}</div><div class="rr-consumed ${high?'high':''}">${consumed!==null?'−'+(isGas?consumed.toFixed(2):Math.round(consumed))+' '+unit:'—'}</div></div>`;
  });
  const tc=isGas?'gas':'elec';
  el.innerHTML=`
    <div class="util-toggle"><button class="util-btn elec ${!isGas?'active':''}" onclick="switchUtilType('electricity')">⚡ Electricity</button><button class="util-btn gas ${isGas?'active':''}" onclick="switchUtilType('gas')">🔥 Gas</button></div>
    ${curBal!==null?`<div class="util-hero ${tc}"><div class="util-hero-label">Current Balance</div><div class="util-hero-value ${tc}">${curBal.toFixed(isGas?2:0)} ${unit}</div><div class="util-hero-sub">as of ${latestR?fmtDate(latestR.reading_date):'—'}</div></div>`:`<div class="alert info"><div class="alert-icon">💡</div><div class="alert-text">No readings yet. Log your first reading below.</div></div>`}
    ${alertHtml}${costInfo}
    <div class="form-sheet" style="margin-bottom:12px;">
      <div class="form-header"><div class="card-title" style="margin-bottom:0;">${isGas?'🔥':'⚡'} Log Reading</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px;">Auto-logging for today: ${fmtDate(today())}</div></div>
      <div class="form-body">
        <div class="form-group"><label>Balance (${unit})</label><input type="number" id="u-balance" placeholder="0" min="0" step="${isGas?'0.01':'1'}" inputmode="decimal"/></div>
        <div class="form-group">
          <label>Recharge Day?</label>
          <div onclick="toggleRechargeToggle()" id="recharge-toggle-wrap" style="display:flex;align-items:center;gap:10px;padding:11px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;background:var(--surface);transition:border 0.15s;">
            <div id="recharge-toggle-box" style="width:20px;height:20px;border-radius:6px;border:2px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;"></div>
            <span id="recharge-toggle-label" style="font-size:14px;font-weight:500;color:var(--text-muted);">Not a recharge day</span>
            <input type="checkbox" id="u-is-recharge" style="display:none;"/>
          </div>
        </div>
        <div class="form-group" id="recharge-field" style="display:none;"><label>Recharge Amount (${unit})</label><input type="number" id="u-recharge-amount" placeholder="0" min="0" step="${isGas?'0.01':'1'}" inputmode="decimal"/></div>
        <div class="form-group"><label>Notes (optional)</label><input type="text" id="u-notes" placeholder="e.g. recharged via bKash"/></div>
      </div>
      <div class="form-footer"><button class="btn btn-primary" onclick="saveReading()">Save Reading</button></div>
    </div>
    ${recentFilled.length?`<div class="card"><div class="card-title">Recent Readings</div><div style="margin:-4px -4px;"><div class="reading-row" style="pad
